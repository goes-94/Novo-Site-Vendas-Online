<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Fale Conosco - Lucão Gaiolas</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      padding: 40px;
      justify-content: space-between;
    }
    .form-section, .contact-section {
      flex: 1;
      min-width: 300px;
      margin: 20px;
    }
    h1 {
      color: #00ff66;
      font-size: 28px;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background-color: #111;
      border: 1px solid #00ff66;
      color: #fff;
    }
    button {
      background-color: #00ff66;
      color: #000;
      padding: 12px 20px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
    .contact-buttons a {
      display: block;
      margin: 10px 0;
      padding: 10px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      border-radius: 5px;
    }
    .phone { background-color: #e74c3c; }
    .whatsapp { background-color: #2ecc71; }
    .email { background-color: #3498db; }
    .social-icons {
      margin-top: 30px;
    }
    .social-icons span {
      margin-right: 15px;
      font-size: 20px;
      color: #888;
    }
    .dog-image {
      max-width: 100%;
      margin-top: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-section">
      <h1>Fale Conosco</h1>
      <form>
        <input type="text" placeholder="Nome" required>
        <input type="email" placeholder="E-mail" required>
        <input type="tel" placeholder="Telefone" required>
        <textarea rows="5" placeholder="Mensagem" required></textarea>
        <button type="submit">ENVIAR MENSAGEM</button>
      </form>
    </div>
    <div class="contact-section">
      <h1>Entre em contato conosco!</h1>
      <div class="contact-buttons">
        <a href="tel:+5541984205083" class="phone">📞 (41) 98420-5083</a>
        <a href="https://wa.me/5541984205083" class="whatsapp">📱 WhatsApp: (41) 98420-5083</a>
        <a href="mailto:lucaogaiolas@gmail.com" class="email">📧 contatolucaogaiolas.com.br</a>
      </div>
      <img src="./img/dog-image.png" alt="Cachorro simpático" class="dog-image">
      <div class="social-icons">
        <span>FB</span>
        <span>IG</span>
        <span>YT</span>
      </div>
    </div>
  </div>
</body>
</html>
